# EB-JEPA self-supervised image pre-training config.
# Single source of truth — run: bash run_train_EBJEPA.sh config.yaml

data:
  # Manifest JSON: {"data": [{"image_id": "rel/path/img0001.npy"}, ...]}
  # each .npy: (H, W, 3) uint8/float
  train_manifest: /path/to/train.json
  valid_manifest:                       # optional; "" / null disables eval
  image_root: /path/to/cifar10_npy      # image_path = image_root/image_id
  img_size: 32                          # CIFAR-10 resolution

model:
  in_chans: 3
  resnet_layers: [2, 2, 2, 2]           # ResNet-18 encoder
  resnet_width: 64
  proj_hidden: 2048                     # VICReg expander
  proj_out: 2048
  pred_hidden: 512                      # predictor bottleneck

objective:                              # VICReg energy coefficients
  std_coeff: 1.0                        # variance (anti-collapse) weight
  cov_coeff: 80.0                       # covariance (decorrelation) weight
  var_gamma: 1.0                        # target per-dim std
  eps: 1.0e-4

optim:                                  # AdamW + linear-warmup + cosine decay
  learning_rate: 1.0e-3
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 1.0e-4
  warmup_steps: 2000
  max_steps: 50000
  per_device_train_batch_size: 256
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

train:
  output_dir: /path/to/ckpts/eb_jepa
  logging_steps: 50
  save_steps: 2000
  eval_steps: 2000
  save_total_limit:                     # null = keep all
  num_workers: 4
  seed: 42
  init_from:                            # optional .pt warm-start
