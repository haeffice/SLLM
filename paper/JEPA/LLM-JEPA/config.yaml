# LLM-JEPA fine-tuning config.
# Single source of truth — run: bash run_train_LLMJEPA.sh config.yaml

data:
  # JSONL, one example/line: {"text": "<NL>", "code": "<code>"}  OR
  # {"messages":[{"role":"user","content":"<NL>"},
  #              {"role":"assistant","content":"<code>"}]}
  train_file: /path/to/train.jsonl
  valid_file:                           # optional; "" / null disables eval

model:
  model_name: meta-llama/Llama-3.2-1B   # any HF causal-LM repo id / path
                                        # use "__tiny__" for the offline smoke
  num_predictors: 1                     # k appended [predictor_i] tokens
  front_pred: false                     # predictor tokens before Text
  jepa_objective: cos                   # cos | l2 | mse | infonce
  lbd: 0.1                              # JEPA loss weight (lambda)
  gamma: 1.0                            # LM loss weight
  infonce_temp: 0.07
  max_length: 512
  torch_dtype: bfloat16                 # float32 on CPU

  use_lora: false                       # LoRA vs full fine-tune (paper ablates both)
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj]

optim:                                  # AdamW + linear-warmup + cosine decay
  learning_rate: 2.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 0.0
  warmup_steps: 0
  max_steps: 1000
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

train:
  output_dir: /path/to/ckpts/llm_jepa
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit:                     # null = keep all
  num_workers: 0
  seed: 42
  init_from:                            # optional .pt warm-start
