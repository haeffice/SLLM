# LeWorldModel (LeWM) self-supervised pre-training config.
# Single source of truth — run: bash run_train_LeWorldModel.sh config.yaml

data:
  # Manifest JSON: {"data": [{"episode_id": "ep0001.npz"}, ...]}
  # each .npz: obs (T, H, W, 3) uint8/float, actions (T, action_dim) float
  train_manifest: /path/to/train.json
  valid_manifest:                       # optional; "" / null disables eval
  data_root: /path/to/episodes          # episode_path = data_root/episode_id
  img_size: 64
  action_dim: 2
  seq_len: 16                           # frames per training window

model:
  patch_size: 8
  embed_dim: 384                        # ViT encoder
  depth: 6
  num_heads: 6
  mlp_ratio: 4.0
  latent_dim: 384
  pred_depth: 4                         # AR predictor
  pred_num_heads: 6

objective:                              # the ONLY tunable loss hyperparameter
  reg_weight: 1.0                       # lambda on SIGReg (isotropic Gaussian)
  num_proj: 64                          # SIGReg random projection directions

optim:                                  # AdamW + linear-warmup + cosine decay
  learning_rate: 3.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 0.05
  warmup_steps: 2000
  max_steps: 50000
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

train:
  output_dir: /path/to/ckpts/lewm
  logging_steps: 50
  save_steps: 2000
  eval_steps: 2000
  save_total_limit:                     # null = keep all
  num_workers: 4
  seed: 42
  init_from:                            # optional .pt warm-start
