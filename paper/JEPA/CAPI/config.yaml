# CAPI self-supervised image pre-training config.
# Single source of truth — run: bash run_train_CAPI.sh config.yaml

data:
  # Manifest JSON: {"data": [{"image_id": "rel/path/img0001.npy"}, ...]}
  # each .npy: (H, W, 3) uint8/float
  train_manifest: /path/to/train.json
  valid_manifest:                       # optional; "" / null disables eval
  image_root: /path/to/imagenet_npy     # image_path = image_root/image_id
  crop_scale: [0.6, 1.0]                # random-resized-crop range (paper)

model:                                  # ViT student encoder (paper: ViT-L/14)
  in_chans: 3
  img_size: 224
  patch_size: 14
  embed_dim: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  num_registers: 16                     # register tokens (CAPI)
  pred_depth: 12                        # cross-attention predictor blocks
  pred_heads: 6

objective:                              # latent MIM + online clustering
  num_prototypes: 16384                 # clustering targets
  mask_ratio: 0.65                      # inverse-block masking
  sinkhorn_eps: 0.05                    # Sinkhorn-Knopp regularisation
  sinkhorn_iters: 3
  student_temp: 0.12                    # student softmax temperature
  ema_momentum:                         # null -> mu = 1 - lr (paper); else pinned

optim:                                  # AdamW + linear-warmup + cosine decay
  learning_rate: 1.0e-3
  adam_beta1: 0.9
  adam_beta2: 0.95
  weight_decay: 5.0e-2
  warmup_steps: 5000
  max_steps: 100000
  per_device_train_batch_size: 128      # paper uses a very large batch (16384)
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  proto_lr_scale: 0.5                   # clustering lr = 0.5 x backbone lr
  bf16: false                           # set true on GPU

train:
  output_dir: /path/to/ckpts/capi
  logging_steps: 50
  save_steps: 2000
  eval_steps: 2000
  save_total_limit:                     # null = keep all
  num_workers: 4
  seed: 42
  init_from:                            # optional .pt warm-start
