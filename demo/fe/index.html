<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Audio Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      #controls {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      #status {
        font-size: 0.9rem;
        color: #555;
      }
      #log {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #log li {
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 0.5rem 0.75rem;
        margin-bottom: 0.5rem;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #log li.error {
        border-color: #c33;
        background: #fee;
      }
    </style>
  </head>
  <body>
    <h1>Audio Demo</h1>
    <p>마이크 입력을 10초 단위로 BE 서버(<code>localhost:8001</code>)로 전송합니다.</p>
    <div id="controls">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
      <span id="status">대기 중</span>
    </div>
    <h3>응답 로그</h3>
    <ul id="log"></ul>
    <script src="app.js"></script>
  </body>
</html>
