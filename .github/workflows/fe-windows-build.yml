name: FE Windows Build

# physics/fe(PySide6 + PyVista) Windows 앱을 빌드하고, 빌드마다 VERSION의 patch를
# 자동으로 +1 해서 커밋([skip ci]로 루프 방지)한 뒤, .exe를 zip으로 묶어
# GitHub Release(fe-vX.Y.Z) + Actions artifact로 배포한다.

on:
  push:
    branches: [AppDemo, main]
    paths:
      - "physics/fe/**"
      - ".github/workflows/fe-windows-build.yml"
  workflow_dispatch: # 수동 실행도 허용

permissions:
  contents: write # VERSION 커밋 push + Release 생성

concurrency:
  group: fe-windows-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        # persist-credentials(기본 true)로 GITHUB_TOKEN이 git push에 사용됨

      - name: Bump version (patch +1)
        id: bump
        shell: bash
        run: |
          f=physics/fe/VERSION
          cur=$(tr -d ' \t\r\n' < "$f")
          IFS=. read -r major minor patch <<< "$cur"
          patch=$((patch + 1))
          new="${major}.${minor}.${patch}"
          printf '%s\n' "$new" > "$f"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "bumped $cur -> $new"

      - name: Commit bumped VERSION
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add physics/fe/VERSION
          git commit -m "FE: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: physics/fe
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows app (PyInstaller)
        working-directory: physics/fe
        run: >
          pyinstaller --noconfirm --windowed --name PhysicsSimulator
          --add-data "VERSION;."
          --collect-all pyvista
          --collect-all pyvistaqt
          --collect-all vtkmodules
          --collect-all meshio
          app.py

      - name: Package zip
        working-directory: physics/fe
        shell: pwsh
        run: >
          Compress-Archive -Path dist/PhysicsSimulator/*
          -DestinationPath "dist/PhysicsSimulator-v${{ steps.bump.outputs.version }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhysicsSimulator-v${{ steps.bump.outputs.version }}
          path: physics/fe/dist/PhysicsSimulator-v${{ steps.bump.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fe-v${{ steps.bump.outputs.version }}
          name: Physics Simulator FE v${{ steps.bump.outputs.version }}
          files: physics/fe/dist/PhysicsSimulator-v${{ steps.bump.outputs.version }}.zip
          body: |
            Auto-built Windows app (PySide6 + PyVista).
            Version ${{ steps.bump.outputs.version }} — CI가 빌드마다 자동 증가시킴.
